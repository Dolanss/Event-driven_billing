version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-postgres
    environment:
      POSTGRES_DB: webhookdb
      POSTGRES_USER: webhookuser
      POSTGRES_PASSWORD: webhookpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhookuser -d webhookdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  webhook-processor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhook-processor
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhookdb
      DB_USER: webhookuser
      DB_PASSWORD: webhookpass
      WEBHOOK_USERNAME: stripe-provider
      WEBHOOK_PASSWORD: super-secret-key
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped

volumes:
  postgres_data:
